name: Generate Resume PDF

on:
  push:
    branches:
      - master
    paths:
      - docs/resume.md

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cache pandoc and TeX Live packages
        id: cache-tex
        uses: actions/cache@v4
        with:
          path: /var/cache/apt/archives
          key: apt-pandoc-texlive-${{ runner.os }}-v1

      - name: Install pandoc and TeX Live
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            pandoc \
            texlive-latex-base \
            texlive-fonts-recommended \
            texlive-latex-extra \
            texlive-xetex \
            lmodern

      - name: Generate PDF from resume.md
        run: |
          pandoc docs/resume.md \
            --pdf-engine=xelatex \
            --variable geometry:margin=1in \
            --variable fontsize=11pt \
            --variable colorlinks=true \
            -o docs/resume.pdf

      - name: Commit and push generated PDF
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/resume.pdf
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: regenerate resume.pdf from resume.md [skip ci]"
            git push
          fi
