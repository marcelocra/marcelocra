name: Generate Resume PDF

on:
  push:
    branches:
      - master
    paths:
      - docs/resume.md
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Generate PDF from resume.md
        # puppeteer version must match md-to-pdf's dep (pnpm v10 blocks install scripts).
        run: |
          pnpm dlx puppeteer@25.1.0 browsers install chrome
          pnpm dlx md-to-pdf@5.2.5 docs/resume.md \
            --launch-options '{"args":["--no-sandbox","--disable-setuid-sandbox"]}'

      - name: Commit and push generated PDF
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/resume.pdf
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: regenerate resume.pdf from resume.md [skip ci]"
            git push
          fi
