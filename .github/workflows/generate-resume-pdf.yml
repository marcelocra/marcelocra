name: Generate Resume PDF

on:
  push:
    branches:
      - master
    paths:
      - docs/resume.md
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install pandoc, TeX Live, and modern fonts
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            pandoc \
            texlive-latex-base \
            texlive-fonts-recommended \
            texlive-latex-extra \
            texlive-xetex \
            fonts-inter

      - name: Generate PDF with modern styling
        # Uses XeLaTeX to allow system fonts (Inter) and custom spacing
        run: |
          pandoc docs/resume.md \
            --pdf-engine=xelatex \
            --variable mainfont="Inter" \
            --variable sansfont="Inter" \
            --variable monofont="DejaVu Sans Mono" \
            --variable geometry:margin=1in \
            --variable fontsize=11pt \
            --variable colorlinks=true \
            --variable linkcolor=blue \
            --variable urlcolor=blue \
            --variable parindent=0pt \
            --variable parskip=10pt \
            -o docs/resume.pdf

      - name: Commit and push generated PDF
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/resume.pdf
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: regenerate resume.pdf from resume.md [skip ci]"
            git push
          fi
