name: Generate Resume PDF

on:
  push:
    branches:
      - master
    paths:
      - docs/resume.md
      - docs/resume-pdf-header.tex
  workflow_dispatch:

env:
  GEIST_FONT_VERSION: "1.7.2"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install pandoc, TeX Live, and Geist fonts
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            pandoc \
            texlive-latex-base \
            texlive-fonts-recommended \
            texlive-latex-recommended \
            texlive-latex-extra \
            texlive-xetex \
            lmodern \
            unzip \
            fontconfig
          curl -fsSL \
            "https://github.com/vercel/geist-font/releases/download/v${GEIST_FONT_VERSION}/geist-font-v${GEIST_FONT_VERSION}.zip" \
            -o /tmp/geist-font.zip
          file /tmp/geist-font.zip | grep -q 'Zip archive' || { echo "geist-font.zip download failed"; exit 1; }
          unzip -q /tmp/geist-font.zip -d /tmp
          sudo mkdir -p /usr/share/fonts/truetype/geist
          sudo cp /tmp/geist-font/Geist/ttf/*.ttf /usr/share/fonts/truetype/geist/
          sudo cp /tmp/geist-font/GeistMono/ttf/*.ttf /usr/share/fonts/truetype/geist/
          sudo fc-cache -fv
          fc-list : family | grep -q '^Geist$' || { echo "Geist font not found"; exit 1; }
          fc-list : family | grep -q '^Geist Mono$' || { echo "Geist Mono font not found"; exit 1; }
          # fontawesome5.sty is in texlive-fonts-extra (~1.3 GB); install only this package from CTAN.
          curl -fsSL "https://mirrors.ctan.org/fonts/fontawesome5.zip" -o /tmp/fontawesome5.zip
          file /tmp/fontawesome5.zip | grep -q 'Zip archive' || { echo "fontawesome5.zip download failed"; exit 1; }
          unzip -q /tmp/fontawesome5.zip -d /tmp
          TEXMF_LOCAL=/usr/share/texlive/texmf-local
          sudo mkdir -p "$TEXMF_LOCAL/tex/latex/fontawesome5"
          sudo mkdir -p "$TEXMF_LOCAL/fonts/opentype/public/fontawesome5"
          sudo cp /tmp/fontawesome5/tex/* "$TEXMF_LOCAL/tex/latex/fontawesome5/"
          sudo cp /tmp/fontawesome5/opentype/*.otf "$TEXMF_LOCAL/fonts/opentype/public/fontawesome5/"
          sudo texhash
          kpsewhich fontawesome5.sty >/dev/null || { echo "fontawesome5.sty not found"; exit 1; }

      - name: Generate PDF from resume.md
        id: pdf
        env:
          SOURCE_SHA: ${{ github.sha }}
        run: |
          SHORT_SHA="${SOURCE_SHA:0:7}"
          BUILD_DATE="$(date -u +%Y.%m.%d)"
          BUILD_TIME="$(date -u +%H%M)"
          PDF_NAME="resume-v${BUILD_DATE}-r${BUILD_TIME}-${SHORT_SHA}.pdf"
          PDF_DIR="docs/pdfs"
          PDF_PATH="${PDF_DIR}/${PDF_NAME}"
          COMMIT_URL="https://github.com/${GITHUB_REPOSITORY}/commit/${SOURCE_SHA}"

          mkdir -p "$PDF_DIR"

          # Footer links the PDF back to the resume.md commit that triggered this build.
          cat > /tmp/resume-pdf-footer.tex <<EOF
          \usepackage{fancyhdr}
          \pagestyle{fancy}
          \fancyhf{}
          \renewcommand{\headrulewidth}{0pt}
          \renewcommand{\footrulewidth}{0pt}
          \fancyfoot[C]{\footnotesize Built from \href{${COMMIT_URL}}{${SHORT_SHA}} (${BUILD_DATE} UTC)}
          EOF

          pandoc docs/resume.md \
            --pdf-engine=xelatex \
            --include-in-header=docs/resume-pdf-header.tex \
            --include-in-header=/tmp/resume-pdf-footer.tex \
            --variable mainfont="Geist" \
            --variable sansfont="Geist" \
            --variable monofont="Geist Mono" \
            --variable geometry:margin=1in \
            --variable fontsize=11pt \
            --variable colorlinks=true \
            --variable linkcolor=blue \
            --variable urlcolor=blue \
            --variable parindent=0pt \
            --variable parskip=6pt \
            -o "$PDF_PATH"

          cp "$PDF_PATH" docs/resume.pdf

          TAG_NAME="${PDF_NAME%.pdf}"
          {
            echo "pdf_path=$PDF_PATH"
            echo "pdf_name=$PDF_NAME"
            echo "tag_name=$TAG_NAME"
            echo "short_sha=$SHORT_SHA"
            echo "commit_url=$COMMIT_URL"
          } >> "$GITHUB_OUTPUT"

      - name: Commit, tag, and push
        env:
          PDF_PATH: ${{ steps.pdf.outputs.pdf_path }}
          PDF_NAME: ${{ steps.pdf.outputs.pdf_name }}
          TAG_NAME: ${{ steps.pdf.outputs.tag_name }}
          SHORT_SHA: ${{ steps.pdf.outputs.short_sha }}
          COMMIT_URL: ${{ steps.pdf.outputs.commit_url }}
          SOURCE_SHA: ${{ github.sha }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/pdfs/ docs/resume.pdf
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "$(cat <<EOF
          chore: add resume PDF ${PDF_NAME} [skip ci]

          Source resume.md: ${COMMIT_URL}
          EOF
          )"

          git tag -a "$TAG_NAME" -m "$(cat <<EOF
          Resume PDF generated from resume.md at ${SOURCE_SHA}.

          Source: ${COMMIT_URL}
          Artifact: ${PDF_PATH}
          EOF
          )"

          git push
          git push origin "$TAG_NAME"
